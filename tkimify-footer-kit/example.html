<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tkimify Footer Example</title>
  <link rel="stylesheet" href="footer.css">
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#11141c;
    }
  </style>
</head>
<body>
  <footer class="page-footer">
    <div class="footer-social-row">
      <a class="instagram-link" href="https://www.instagram.com/startingfive_basketball/" target="_blank" rel="noopener noreferrer" aria-label="Starting Five on Instagram">
        <svg class="instagram-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="4" width="16" height="16" rx="5"></rect>
          <circle cx="12" cy="12" r="4"></circle>
          <circle cx="17" cy="7" r="1.2"></circle>
        </svg>
      </a>
      <a class="instagram-link tkimify-link" href="https://tkimify.com" target="_blank" rel="noopener noreferrer" aria-label="tkimify">
        <img class="tkimify-icon" src="tkimifylight.png" alt="">
      </a>
    </div>
  </footer>
</body>
</html>
